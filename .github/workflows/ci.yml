name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @game/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build client (includes bundle size check)
        run: pnpm --filter client build

      - name: Update bundle size badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.BADGE_GIST_ID }}
        run: |
          if [[ -z "$GIST_TOKEN" || -z "$GIST_ID" ]]; then
            echo "Gist secrets not configured, skipping badge update."
            exit 0
          fi
          CONTENT=$(jq -Rs '.' < client/dist/bundle-badge.json)
          curl -sf -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"files\":{\"bundle-badge.json\":{\"content\":$CONTENT}}}"
